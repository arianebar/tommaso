<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tommaso Mood</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F5F0E8;
    --text: #1a1a1a;
    --accent: #D4A574;
    --card-bg: rgba(255,255,255,0.6);
    --selected-ring: #C4956A;
    --input-bg: #fff;
    --shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  .container {
    max-width: 520px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(28px, 7vw, 48px);
    text-align: center;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .moods {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
  }

  .mood-card {
    position: relative;
    cursor: pointer;
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    width: 140px;
    height: 140px;
    flex-shrink: 0;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .mood-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    border: 3px solid transparent;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    pointer-events: none;
  }

  .mood-card:hover {
    transform: scale(1.06);
  }

  .mood-card.selected {
    transform: scale(1.08);
    box-shadow: 0 12px 40px rgba(196, 149, 106, 0.35);
  }

  .mood-card.selected::after {
    border-color: var(--selected-ring);
    box-shadow: 0 0 0 3px rgba(196, 149, 106, 0.2);
  }

  .mood-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    pointer-events: none;
  }

  .mood-label {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 500;
    color: #888;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .mood-card.selected .mood-label {
    opacity: 1;
  }

  .check-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--selected-ring);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 2;
  }

  .mood-card.selected .check-badge {
    opacity: 1;
    transform: scale(1);
  }

  .check-badge svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    stroke-width: 3;
    fill: none;
  }

  .send-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .send-section.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .input-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .phone-input {
    flex: 1;
    padding: 14px 18px;
    border: 2px solid rgba(0,0,0,0.08);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .phone-input::placeholder {
    color: #bbb;
  }

  .phone-input:focus {
    border-color: var(--selected-ring);
    box-shadow: 0 0 0 4px rgba(196, 149, 106, 0.15);
  }

  .send-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    background: var(--text);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.3s ease, opacity 0.3s ease;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  .send-btn:hover {
    transform: scale(1.03);
  }

  .send-btn:active {
    transform: scale(0.97);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .hint {
    text-align: center;
    font-size: 13px;
    color: #aaa;
    line-height: 1.4;
  }

  /* Subtle floating animation on cards */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .mood-card:nth-child(1) { animation: float 4s ease-in-out infinite; }
  .mood-card:nth-child(2) { animation: float 4s ease-in-out 0.5s infinite; }
  .mood-card:nth-child(3) { animation: float 4s ease-in-out 1s infinite; }

  .mood-card.selected { animation: none; }

  @media (max-width: 480px) {
    .mood-card { width: 100px; height: 100px; border-radius: 16px; }
    .mood-card::after { border-radius: 16px; }
    .moods { gap: 12px; }
    .container { gap: 28px; }
  }
</style>
</head>

  <div class="send-section" id="sendSection">
    <div class="input-row">
      <input type="tel" class="phone-input" id="phoneInput" placeholder="Numéro de téléphone" inputmode="tel" autocomplete="tel">
      <button class="send-btn" id="sendBtn" disabled onclick="sendMood()">Envoyer</button>
    </div>
    <p class="hint">L'app SMS de ton téléphone s'ouvrira avec le mood sélectionné</p>
  </div>
</div>

<script>
  let selectedMood = null;
  const moodMessages = {
    cozy: "Mode cocoon activé 🫣 Voici mon mood Tommaso du jour → cozy hibernation",
    detective: "J'enquête sur toi 🔍 Voici mon mood Tommaso du jour → detective mode",
    scheming: "Je prépare un mauvais coup 🤔 Voici mon mood Tommaso du jour → evil genius"
  };

  function selectMood(card) {
    // Remove previous selection
    document.querySelectorAll('.mood-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedMood = card.dataset.mood;

    // Show send section
    document.getElementById('sendSection').classList.add('visible');
    document.getElementById('phoneInput').focus();
    updateSendBtn();
  }

  const phoneInput = document.getElementById('phoneInput');
  phoneInput.addEventListener('input', updateSendBtn);

  function updateSendBtn() {
    const phone = phoneInput.value.replace(/\s/g, '');
    document.getElementById('sendBtn').disabled = !selectedMood || phone.length < 6;
  }

  function sendMood() {
    const phone = phoneInput.value.replace(/\s/g, '');
    if (!selectedMood || phone.length < 6) return;

    const msg = moodMessages[selectedMood];
    // Use sms: URI for mobile
    const separator = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? '&' : '?';
    window.location.href = `sms:${phone}${separator}body=${encodeURIComponent(msg)}`;
  }

  // Allow Enter key to send
  phoneInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled) {
      sendMood();
    }
  });
</script>

</body>
</html>
